<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>DEVLOG UlpoMedia Viewer — Local</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Rajdhani:wght@400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    /* ════════════════════════════════════════
       DESIGN SYSTEM — CYBERPUNK (GREEN/PINK)
    ════════════════════════════════════════ */
    :root {
      --bg-dark:      #05070c;
      --bg-surface:   #070b12;
      --bg-elevated:  #0b111a;
      --border:       #2a3a2a;
      --border-light: #447035;

      --green:      #7afd2e;
      --green-dark: #5fc024;
      --green-glow: rgba(122,253,46,0.18);
      --green-dim:  rgba(122,253,46,0.07);

      --pink:      #fd2ea5;
      --pink-dark: #cc1f84;
      --pink-glow: rgba(253,46,165,0.18);

      --yellow:      #f6b716;
      --yellow-dark: #d4940f;

      --text-primary:   #eef2ff;
      --text-secondary: #c8c4c4;
      --text-muted:     #8a8a8a;

      --head: 'Barlow Condensed', 'Arial Narrow', sans-serif;
      --body: 'Rajdhani', 'Segoe UI', sans-serif;
      --mono: 'Share Tech Mono', 'Courier New', monospace;

      --sidebar-w: 240px;
      --nav-h:     64px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      font-size: 16px;
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg-dark);
      color: var(--text-primary);
      font-family: var(--body);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* glows ambientales */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 20% 30%, var(--green-glow), transparent 45%),
      radial-gradient(circle at 85% 70%, var(--pink-glow), transparent 45%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
              linear-gradient(var(--border) 1px, transparent 1px),
              linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.1;
      pointer-events: none;
      z-index: 0;
    }

    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; background: none; border: none; font-family: inherit; }
    img { max-width: 100%; display: block; }

    /* scrollbar neon */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg-dark); }
    ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--green); }

    /* ════════════════════════════════════════
       NAVBAR
    ════════════════════════════════════════ */
    #nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--nav-h);
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 24px;
      background: rgba(5,7,12,0.94);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border-light);
      box-shadow: 0 0 20px var(--green-glow);
      z-index: 200;
    }

    .nav-logo {
      font-family: var(--head);
      font-weight: 900;
      font-size: 18px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .nav-logo .acc { color: var(--green); }
    .nav-logo .dim { color: var(--text-muted); font-weight: 400; font-size: 10px; letter-spacing: 0.1em; margin-left: 8px; }

    #search-wrap {
      flex: 1;
      max-width: 360px;
      position: relative;
    }
    #search-wrap::before {
      content: '⌕';
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      color: var(--text-muted);
      pointer-events: none;
      z-index: 1;
    }

    #search-input {
      width: 100%;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.06em;
      padding: 8px 12px 8px 34px;
      outline: none;
      transition: border 0.2s, box-shadow 0.2s;
    }
    #search-input:focus {
      border-color: var(--green);
      box-shadow: 0 0 10px var(--green-glow);
    }
    #search-input::placeholder {
      color: var(--text-muted);
      font-family: var(--mono);
      font-size: 9px;
    }

    #nav-status {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      text-transform: uppercase;
      white-space: nowrap;
      display: none;
      align-items: center;
      gap: 6px;
    }
    #nav-status.visible { display: flex; }
    .status-dot {
      width: 7px;
      height: 7px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    .btn {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 7px 18px;
      border: 1px solid var(--green);
      background: transparent;
      color: var(--green);
      transition: all 0.2s ease;
      clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
      white-space: nowrap;
    }
    .btn:hover:not(:disabled) {
      background: var(--green);
      color: var(--bg-dark);
      border-color: var(--green);
      box-shadow: 0 0 12px var(--green-glow);
    }
    .btn.primary {
      border-color: var(--green);
      color: var(--green);
    }
    .btn.primary:hover {
      background: var(--green);
      color: #000;
    }
    .btn:disabled {
      border-color: var(--pink);
      color: var(--pink);
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* ════════════════════════════════════════
       LAYOUT PRINCIPAL
    ════════════════════════════════════════ */
    #app {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      min-height: 100vh;
      padding-top: var(--nav-h);
    }

    /* ════════════════════════════════════════
       SIDEBAR — FILTROS CYBER
    ════════════════════════════════════════ */
    #sidebar {
      position: sticky;
      top: var(--nav-h);
      height: calc(100vh - var(--nav-h));
      overflow-y: auto;
      border-right: 1px solid var(--border);
      background: var(--bg-surface);
      padding: 24px 16px;
      scrollbar-width: thin;
    }

    .sb-section {
      margin-bottom: 28px;
    }

    .sb-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
      padding-bottom: 5px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .chip-group {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .f-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 4px 9px;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      background: transparent;
      cursor: pointer;
      transition: all 0.15s;
      border-radius: 0px;
      clip-path: polygon(0 0, calc(100% - 4px) 0, 100% 4px, 100% 100%, 4px 100%, 0 calc(100% - 4px));
    }
    .f-chip:hover {
      border-color: var(--green);
      color: var(--green);
      background: rgba(122,253,46,0.1);
    }
    .f-chip.active {
      border-color: var(--green);
      background: var(--green);
      color: var(--bg-dark);
      box-shadow: 0 0 8px var(--green-glow);
    }
    .f-chip .chip-n {
      font-size: 7px;
      opacity: 0.7;
    }

    .f-chip.type-release { border-color: var(--pink-dark); color: var(--pink); }
    .f-chip.type-release.active, .f-chip.type-release:hover { background: var(--pink); border-color: var(--pink); color: #000; }

    .f-chip.type-devlog { border-color: var(--yellow-dark); color: var(--yellow); }
    .f-chip.type-devlog.active, .f-chip.type-devlog:hover { background: var(--yellow); border-color: var(--yellow); color: #000; }

    /* ════════════════════════════════════════
       MAIN — CONTENIDO
    ════════════════════════════════════════ */
    #main {
      padding: 32px 36px 60px;
    }

    /* empty state */
    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 65vh;
      text-align: center;
      gap: 20px;
    }
    .es-icon {
      font-size: 64px;
      opacity: 0.5;
      filter: drop-shadow(0 0 4px var(--green));
    }
    .es-title {
      font-family: var(--head);
      font-weight: 900;
      font-size: 34px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }
    .es-sub {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      max-width: 420px;
      line-height: 1.8;
    }
    .es-sub code {
      color: var(--green);
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      padding: 0 6px;
    }
    .es-hint {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--border-light);
    }

    /* List header */
    #list-view {
      animation: fadeIn 0.2s;
    }
    .list-header {
      display: flex;
      align-items: baseline;
      gap: 18px;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border-light);
      padding-bottom: 12px;
    }
    .list-title {
      font-family: var(--head);
      font-weight: 900;
      font-size: 42px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      line-height: 1;
    }
    .list-title .acc { color: var(--green); }
    .list-count {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.14em;
    }

    .active-filter-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }
    .af-badge {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.08em;
      padding: 4px 12px;
      border: 1px solid var(--green);
      color: var(--green);
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(122,253,46,0.05);
    }
    .af-badge .af-x {
      cursor: pointer;
      font-weight: bold;
      transition: 0.1s;
    }
    .af-badge .af-x:hover { color: var(--pink); text-shadow: 0 0 3px var(--pink); }

    /* month separators */
    .month-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 20px 0 6px;
      border-bottom: 1px dashed var(--border);
      margin: 16px 0 10px;
    }
    .month-label:first-of-type { margin-top: 0; }

    /* cards */
    .post-card {
      display: flex;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 8px;
      position: relative;
      overflow: hidden;
    }
    .post-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--green-dim);
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    .post-card:hover {
      border-color: var(--green);
      transform: translateX(5px);
      box-shadow: -5px 0 0 var(--green);
    }
    .post-card:hover::after { opacity: 1; }
    .post-card.t-release:hover { border-color: var(--pink); box-shadow: -5px 0 0 var(--pink); }
    .post-card.t-devlog:hover  { border-color: var(--yellow); box-shadow: -5px 0 0 var(--yellow); }

    .card-bar {
      width: 4px;
      flex-shrink: 0;
      background: var(--border-light);
      transition: background 0.2s;
    }
    .post-card:hover .card-bar { background: var(--green); }
    .post-card.t-release .card-bar { background: var(--pink-dark); }
    .post-card.t-release:hover .card-bar { background: var(--pink); }
    .post-card.t-devlog .card-bar { background: var(--yellow-dark); }
    .post-card.t-devlog:hover .card-bar { background: var(--yellow); }

    .card-inner {
      padding: 14px 18px;
      flex: 1;
      z-index: 1;
    }
    .card-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }
    .card-date {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-muted);
      letter-spacing: 0.1em;
    }
    .type-badge {
      font-family: var(--mono);
      font-size: 7px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 2px 7px;
      border: 1px solid currentColor;
      border-radius: 0;
    }
    .type-badge.update  { color: var(--green); }
    .type-badge.release { color: var(--pink); }
    .type-badge.devlog  { color: var(--yellow); }

    .card-project {
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-secondary);
      opacity: 0.8;
    }
    .card-title {
      font-family: var(--head);
      font-weight: 700;
      font-size: 20px;
      letter-spacing: 0.04em;
      line-height: 1.2;
      margin-bottom: 4px;
    }
    .card-excerpt {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.5;
    }
    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 8px;
    }
    .ptag {
      font-family: var(--mono);
      font-size: 7px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 2px 8px;
      background: var(--green-dim);
      border: 1px solid var(--border);
      color: var(--text-muted);
    }

    /* post individual */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-secondary);
      background: transparent;
      border: 1px solid var(--border);
      padding: 6px 14px;
      transition: all 0.2s;
      margin-bottom: 32px;
    }
    .back-btn:hover { border-color: var(--green); color: var(--green); }

    .post-header {
      border-left: 3px solid var(--green);
      padding-left: 22px;
      margin-bottom: 38px;
    }
    .post-header.t-release { border-left-color: var(--pink); }
    .post-header.t-devlog  { border-left-color: var(--yellow); }
    .post-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .post-h-title {
      font-family: var(--head);
      font-weight: 900;
      font-size: clamp(28px, 5vw, 52px);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      line-height: 1.1;
      margin-bottom: 12px;
    }

    /* markdown body */
    .post-body {
      font-family: var(--body);
      font-size: 15.5px;
      line-height: 1.75;
      color: var(--text-secondary);
      max-width: 820px;
    }
    .post-body h1, .post-body h2, .post-body h3, .post-body h4 {
      font-family: var(--head);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-primary);
    }
    .post-body h1 {
      font-size: 30px;
      color: var(--green);
      border-bottom: 1px solid var(--border-light);
      padding-bottom: 6px;
      margin-top: 40px;
      margin-bottom: 20px;
    }
    .post-body h2 { font-size: 24px; margin: 32px 0 14px; }
    .post-body h3 { font-size: 20px; margin: 28px 0 10px; }
    
    .post-body p,
    .post-body li,
    .post-body blockquote,
    .post-body .card-excerpt {
      text-align: justify;
    }

    .post-body li p {
      text-align: justify;
    }

    .post-body h1,
    .post-body h2,
    .post-body h3,
    .post-body h4 {
      text-align: left;
    }
    
    .post-body strong { color: var(--text-primary); }
    .post-body a {
      color: var(--green);
      border-bottom: 1px solid var(--green-dark);
    }
    .post-body a:hover { color: var(--pink); border-bottom-color: var(--pink); }
    .post-body code {
      font-family: var(--mono);
      font-size: 12px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      padding: 2px 6px;
      color: var(--green);
    }
    .post-body pre {
      background: var(--bg-elevated);
      border-left: 3px solid var(--green);
      padding: 16px 20px;
      overflow-x: auto;
      margin: 24px 0;
    }
    .post-body pre code {
      background: none;
      border: none;
      padding: 0;
    }
    .post-body blockquote {
      border-left: 3px solid var(--pink);
      background: rgba(253,46,165,0.05);
      padding: 12px 20px;
      margin: 24px 0;
      font-style: italic;
    }
    .post-body ul, .post-body ol { padding-left: 24px; margin-bottom: 18px; }
    .post-body li::marker { color: var(--green); }
    .post-body hr { border: none; border-top: 1px solid var(--border-light); margin: 36px 0; }
    .post-body img {
      border: none;
      margin: 20px 0;
    }
    .post-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 24px 0;
    }
    .post-body th, .post-body td {
      border: 1px solid var(--border);
      padding: 8px 12px;
    }
    .post-body th {
      background: var(--bg-elevated);
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.12em;
      color: var(--green);
    }

    /* EDITOR CYBER */
    .editor-container {
      max-width: 860px;
      margin: 0 auto;
      padding: 20px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      box-shadow: 0 0 20px var(--green-glow);
    }
    .editor-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      border-bottom: 1px solid var(--border-light);
      padding-bottom: 12px;
    }
    .editor-header h2 {
      font-family: var(--head);
      font-size: 28px;
      letter-spacing: 0.1em;
      color: var(--green);
      text-transform: uppercase;
    }
    .editor-grid {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .editor-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .input {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.06em;
      outline: none;
      transition: border 0.2s;
    }
    .input:focus {
      border-color: var(--green);
      box-shadow: 0 0 6px var(--green-glow);
    }
    .editor-textarea {
      width: 100%;
      min-height: 340px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.5;
      padding: 14px;
      resize: vertical;
    }
    .editor-textarea:focus {
      border-color: var(--green);
      outline: none;
    }
    .editor-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 20px;
    }
    .loading-msg {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid var(--border-light);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .no-results {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
      padding: 40px;
      text-align: center;
    }
  </style>
</head>
<body>

<nav id="nav">
  <div class="nav-logo">
    <span class="acc">DEV</span>LOG<span class="dim">LOCAL VIEWER</span>
  </div>
  <div id="search-wrap">
    <input type="text" id="search-input" placeholder="Buscar posts..." autocomplete="off" spellcheck="false">
  </div>
  <div id="nav-status">
    <span class="status-dot"></span>
    <span id="status-text"></span>
  </div>
  <button class="btn primary" id="open-btn" onclick="openFolder()">⊕ Abrir Carpeta</button>
  <button class="btn primary" onclick="openEditor()">✎ Nuevo post</button>
</nav>

<div id="app">
  <aside id="sidebar">
    <div id="sb-content">
      <div class="sb-section">
        <div class="sb-label">Repositorio</div>
        <div style="font-family:var(--mono);font-size:9px;color:var(--text-muted);letter-spacing:0.08em;line-height:1.8;">
          Sin carpeta abierta.<br>
          Haz clic en ⊕ Abrir Carpeta.
        </div>
      </div>
    </div>
  </aside>
  <main id="main">
    <!-- empty state -->
    <div id="empty-state">
      <div class="es-icon">📁</div>
      <div class="es-title">Sin Posts Cargados</div>
      <div class="es-sub">
        Abre la raíz de tu repositorio <code>blog-posts</code><br>
        para leer tus devlogs localmente.<br>
        Soporta imágenes de Imgur y markdown completo.
      </div>
      <div class="es-hint">// Chrome / Edge — File System Access API</div>
    </div>

    <!-- list view -->
    <div id="list-view" style="display:none;">
      <div class="list-header">
        <div class="list-title">DEV<span class="acc">LOG</span></div>
        <div class="list-count" id="list-count"></div>
      </div>
      <div id="active-filters"></div>
      <div id="post-list"></div>
    </div>

    <!-- single post -->
    <div id="post-view" style="display:none;">
      <button class="back-btn" onclick="showList()">← Volver al listado</button>
      <div id="post-header-el" class="post-header"></div>
      <div id="post-body-el" class="post-body"></div>
    </div>

    <!-- editor -->
    <div id="editor-view" style="display:none;">
      <div class="editor-container">
        <div class="editor-header">
          <h2>✎ Nuevo Devlog</h2>
          <button class="btn ghost" onclick="showList()">← Cancelar</button>
        </div>
        <div class="editor-grid">
          <input class="input" id="ed-title" placeholder="Título del post">
          <div class="editor-row">
            <input class="input" id="ed-project" placeholder="Proyecto (ej: ULPO Engine)">
            <input class="input" id="ed-category" placeholder="Categoría (game / ulpomedia)">
          </div>
          <div class="editor-row">
            <input class="input" id="ed-tags" placeholder="Etiquetas separadas por coma (ej: devlog, pixelart)">
            <select class="input" id="ed-type">
              <option value="devlog">Devlog</option>
              <option value="update">Update</option>
              <option value="release">Release</option>
            </select>
          </div>
          <textarea class="editor-textarea" id="ed-body" placeholder="Escribe tu markdown aquí..."></textarea>
          <div class="editor-actions">
            <button class="btn primary" onclick="downloadMD()">⬇ Descargar .md</button>
            <button class="btn" onclick="copyIndexEntry()" style="margin-left: 12px;"> 🗐 Copiar para index.json</button>
          </div>
          <label class="sb-label" style="margin-top:8px;">Vista previa para index.json</label>
          <textarea class="input" id="json-preview" readonly style="height:120px; font-family:var(--mono); font-size:9px; background:#0a0f16;"></textarea>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
  /* ════════════════════════════════════════════
     STATE & GLOBALS
  ════════════════════════════════════════════ */
  const S = {
    dir: null,
    allPosts: [],
    posts: [],
    cache: {},
    view: 'empty',
    filter: { tag: null, project: null, category: null, month: null, type: null, search: '' }
  };

  /* ════════════════════════════════════════════
     FILE SYSTEM
  ════════════════════════════════════════════ */
  async function openFolder() {
    if (!window.showDirectoryPicker) return alert("File System Access API no soportada. Usa Chrome/Edge.");
    try {
      S.dir = await window.showDirectoryPicker({ mode: 'read' });
      await loadManifest();
    } catch (err) {
      if (err.name !== 'AbortError') console.warn(err);
    }
  }

  async function loadManifest() {
    try {
      const handle = await S.dir.getFileHandle('index.json');
      const raw = await (await handle.getFile()).text();
      const manifest = JSON.parse(raw);
      S.allPosts = (manifest.posts || [])
              .filter(p => (p.category || 'game') === 'ulpomedia' || p.category === 'ulpomedia')
              .sort((a,b) => new Date(b.date) - new Date(a.date));
      applyFilters();
      buildSidebar();
      showList();
      const statusDiv = document.getElementById('nav-status');
      document.getElementById('status-text').innerText = `${S.allPosts.length} post${S.allPosts.length !== 1 ? 's' : ''} cargados`;
      statusDiv.classList.add('visible');
    } catch(e) {
      alert("No se encontró index.json en la carpeta raíz.");
    }
  }

  async function loadPostFile(slug) {
    if (S.cache[slug]) return S.cache[slug];
    const meta = S.allPosts.find(p => p.slug === slug);
    const paths = [
      async () => {
        if (meta?.category) {
          const dir = await S.dir.getDirectoryHandle(meta.category);
          return dir.getFileHandle(`${slug}.md`);
        }
        throw '';
      },
      async () => {
        const dir = await S.dir.getDirectoryHandle('es');
        return dir.getFileHandle(`${slug}.md`);
      },
      async () => S.dir.getFileHandle(`${slug}.md`)
    ];
    for (const attempt of paths) {
      try {
        const fileHandle = await attempt();
        const text = await (await fileHandle.getFile()).text();
        S.cache[slug] = text;
        return text;
      } catch(_) {}
    }
    throw new Error(`No se encontró ${slug}.md`);
  }

  /* ════════════════════════════════════════════
     FRONTMATTER + RENDER
  ════════════════════════════════════════════ */
  function parseFrontmatter(raw) {
    const match = raw.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n([\s\S]*)$/);
    if (!match) return { fm: {}, body: raw };
    const fm = {};
    match[1].split('\n').forEach(line => {
      const idx = line.indexOf(':');
      if (idx === -1) return;
      let key = line.slice(0, idx).trim();
      let val = line.slice(idx+1).trim();
      if ((val.startsWith('"') && val.endsWith('"')) || (val.startsWith("'") && val.endsWith("'"))) val = val.slice(1,-1);
      if (val.startsWith('[')) try { val = JSON.parse(val); } catch(e) {}
      fm[key] = val;
    });
    return { fm, body: match[2].trim() };
  }

  function renderMd(md) {
    if (!md) return '';
    let html = md;

    // 1. Extraer y proteger bloques de código
    const blocks = [];
    html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
      const i = blocks.length;
      const esc = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      blocks.push(`<pre><code class="lang-${lang||'txt'}">${esc}</code></pre>`);
      return `\x00BLK${i}\x00`;
    });

    // 2. Extraer y proteger código inline
    const inlines = [];
    html = html.replace(/`([^`\n]+)`/g, (_, c) => {
      const i = inlines.length;
      const esc = c.replace(/&/g,'&amp;').replace(/</g,'&lt;');
      inlines.push(`<code>${esc}</code>`);
      return `\x00INL${i}\x00`;
    });

    // 3. Convertir URLs de imágenes y videos PRIMERO (antes del escapado)
    html = html.replace(/(https?:\/\/[^\s<>]+\.(?:png|jpg|jpeg|gif|webp)(?:\?[^\s<>]*)?)/gi,
            (url) => `<img src="${url}" loading="lazy" style="max-width:100%; margin:16px 0; display:block;">`);
    html = html.replace(/(https?:\/\/[^\s<>]+\.(?:mp4|webm|mov)(?:\?[^\s<>]*)?)/gi,
            (url) => `<video controls style="max-width:100%; margin:16px 0; display:block;"><source src="${url}" type="video/mp4"></video>`);

    // 4. Escapado general de caracteres HTML (pero dejamos los marcadores \x00)
    html = html.replace(/&(?!amp;|lt;|gt;|#x00)/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');

    // 5. Sintaxis Markdown adicional
    html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" loading="lazy" style="max-width:100%; display:block;">');
    html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

    // 6. Encabezados, negritas, etc.
    html = html.replace(/^### (.*$)/gm, '<h3>$1</h3>')
            .replace(/^## (.*$)/gm, '<h2>$1</h2>')
            .replace(/^# (.*$)/gm, '<h1>$1</h1>');
    html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.+?)\*/g, '<em>$1</em>');

    // 7. Tablas, blockquotes, listas, hr
    html = html.replace(/^\|(.+)\|\n\|[-| :]+\|\n((?:\|.+\|\n?)*)/gm, (_, hdr, rows) => {
      const th = hdr.split('|').filter(c=>c.trim()).map(c=>`<th>${c.trim()}</th>`).join('');
      const trs = rows.trim().split('\n').map(r => `<tr>${r.split('|').filter(c=>c.trim()).map(c=>`<td>${c.trim()}</td>`).join('')}</tr>`).join('');
      return `<table><thead><tr>${th}</tr></thead><tbody>${trs}</tbody></table>`;
    });

    // 8. Manejar blockquotes (líneas que empiezan con >)
    html = html.replace(/^&gt; (.*$)/gm, '<blockquote>$1</blockquote>\n');
    // Solucionar blockquotes multilínea
    html = html.replace(/(<blockquote>.*?<\/blockquote>\n?)+/gs, (match) => {
      const content = match.replace(/<\/?blockquote>/g, '').trim();
      return `<blockquote>${content}</blockquote>\n`;
    });

    // 9. Listas
    html = html.replace(/((?:^[ \t]*[-*+] .+\n?)+)/gm, m => `<ul>${m.trim().split('\n').map(l => `<li>${l.replace(/^[ \t]*[-*+] /, '')}</li>`).join('')}</ul>`);
    html = html.replace(/((?:^\d+\. .+\n?)+)/gm, m => `<ol>${m.trim().split('\n').map(l => `<li>${l.replace(/^\d+\. /, '')}</li>`).join('')}</ol>`);
    html = html.replace(/^---$/gm, '<hr>');

    // 10. PÁRRAFOS - Versión corregida que SIEMPRE justifica
    const paragraphs = html.split(/\n{2,}/);
    const justified = paragraphs.map(para => {
      para = para.trim();
      if (!para) return '';
      // Si ya está envuelto en una etiqueta HTML, no lo alteres
      if (/^<(h[1-6]|ul|ol|blockquote|pre|table|hr|img|video|div)/.test(para)) return para;
      // Si es una línea simple sin etiquetas, envuelve en <p class="justified">
      if (!para.includes('<') || para.indexOf('<') > 0) {
        return `<p style="text-align: justify; margin-bottom: 1rem;">${para.replace(/\n/g, '<br>')}</p>`;
      }
      // Para casos mixtos, procesa línea por línea
      return para.split(/\n/).map(line => {
        if (line.trim() && !line.match(/^<(h[1-6]|ul|ol|li|blockquote|pre|table|hr|img|video|div)/)) {
          return `<p style="text-align: justify; margin-bottom: 0.5rem;">${line}</p>`;
        }
        return line;
      }).join('');
    }).join('\n');

    html = justified;

    // 11. Restaurar bloques de código
    blocks.forEach((c,i) => html = html.replace(new RegExp(`\\x00BLK${i}\\x00`, 'g'), c));
    inlines.forEach((c,i) => html = html.replace(new RegExp(`\\x00INL${i}\\x00`, 'g'), c));

    return html;
  }

  /* helpers y resto de lógica (filtros, sidebar, renderList, openPost, showList, etc) se mantienen */
  const MONTHS = { '01':'Enero','02':'Febrero','03':'Marzo','04':'Abril','05':'Mayo','06':'Junio','07':'Julio','08':'Agosto','09':'Septiembre','10':'Octubre','11':'Noviembre','12':'Diciembre' };
  function monthLabel(k){ if(!k) return 'Sin fecha'; let [y,m]=k.split('-'); return `${MONTHS[m]||m} ${y}`; }
  function getTitle(p){ return p.title?.es || p.title?.en || p.slug; }
  function getExcerpt(p){ return p.excerpt?.es || p.excerpt?.en || ''; }

  function applyFilters(){
    let posts = [...S.allPosts];
    const f = S.filter;
    if(f.category) posts = posts.filter(p => p.category === f.category);
    if(f.tag) posts = posts.filter(p => (p.tags||[]).includes(f.tag));
    if(f.project) posts = posts.filter(p => p.project === f.project);
    if(f.type) posts = posts.filter(p => (p.type||'update') === f.type);
    if(f.month) posts = posts.filter(p => p.date?.startsWith(f.month));
    if(f.search){
      const q = f.search.toLowerCase();
      posts = posts.filter(p => getTitle(p).toLowerCase().includes(q) || getExcerpt(p).toLowerCase().includes(q) || (p.tags||[]).join(' ').toLowerCase().includes(q));
    }
    S.posts = posts;
  }
  function setFilter(key,val){ S.filter[key] = (S.filter[key] === val) ? null : val; applyFilters(); renderList(); syncChips(); }
  function clearFilters(){ S.filter = { tag:null, project:null, category:null, month:null, type:null, search: S.filter.search }; applyFilters(); renderList(); syncChips(); }
  function clearOneFilter(k){ S.filter[k] = null; applyFilters(); renderList(); syncChips(); }
  function renderFilterBadges(){
    const labels = { tag:'Tag', project:'Proyecto', month:'Mes', type:'Tipo' };
    const active = Object.entries(S.filter).filter(([k,v]) => k !== 'search' && v);
    const el = document.getElementById('active-filters');
    if(!active.length){ el.innerHTML = ''; return; }
    el.innerHTML = `<div class="active-filter-bar">${active.map(([k,v])=>`<span class="af-badge">${labels[k] || k}: ${k==='month'?monthLabel(v):v}<span class="af-x" onclick="clearOneFilter('${k}')">✕</span></span>`).join('')}<span class="af-badge" onclick="clearFilters()" style="cursor:pointer;">Limpiar todo ✕</span></div>`;
  }
  function syncChips(){ document.querySelectorAll('.f-chip[data-fkey]').forEach(el=>{ el.classList.toggle('active', S.filter[el.dataset.fkey] === el.dataset.fval); }); const allChip=document.getElementById('chip-all'); if(allChip) allChip.classList.toggle('active', !Object.entries(S.filter).some(([k,v])=>k!=='search' && v)); }

  function buildSidebar(){
    const posts = S.allPosts;
    const cats={}, projs={}, types={}, months={}, tags={};
    posts.forEach(p=>{
      if(p.category) cats[p.category]=(cats[p.category]||0)+1;
      if(p.project) projs[p.project]=(projs[p.project]||0)+1;
      let t = p.type||'update'; types[t]=(types[t]||0)+1;
      if(p.date){ let mo = p.date.slice(0,7); months[mo]=(months[mo]||0)+1; }
      (p.tags||[]).forEach(tg=> tags[tg]=(tags[tg]||0)+1);
    });
    const TYPE_LABEL = { update:'Update', release:'Release', devlog:'Devlog' };
    let html = `<div class="sb-section"><div class="sb-label">Vista</div><div class="chip-group"><button class="f-chip" id="chip-all" onclick="clearFilters()">Todos <span class="chip-n">${posts.length}</span></button></div></div>`;
    if(Object.keys(cats).length) html += `<div class="sb-section"><div class="sb-label">Categoría</div><div class="chip-group">${Object.entries(cats).map(([k,v])=>`<button class="f-chip" data-fkey="category" data-fval="${k}" onclick="setFilter('category','${k}')">${k}<span class="chip-n">${v}</span></button>`).join('')}</div></div>`;
    if(Object.keys(projs).length) html += `<div class="sb-section"><div class="sb-label">Proyecto</div><div class="chip-group">${Object.entries(projs).map(([k,v])=>`<button class="f-chip" data-fkey="project" data-fval="${k}" onclick="setFilter('project','${k}')">${k}<span class="chip-n">${v}</span></button>`).join('')}</div></div>`;
    if(Object.keys(types).length>1) html += `<div class="sb-section"><div class="sb-label">Tipo</div><div class="chip-group">${Object.entries(types).map(([k,v])=>`<button class="f-chip type-${k}" data-fkey="type" data-fval="${k}" onclick="setFilter('type','${k}')">${TYPE_LABEL[k]||k}<span class="chip-n">${v}</span></button>`).join('')}</div></div>`;
    if(Object.keys(months).length) html += `<div class="sb-section"><div class="sb-label">Mes</div><div class="chip-group">${Object.entries(months).sort((a,b)=>b[0].localeCompare(a[0])).map(([k,v])=>`<button class="f-chip" data-fkey="month" data-fval="${k}" onclick="setFilter('month','${k}')">${monthLabel(k)}<span class="chip-n">${v}</span></button>`).join('')}</div></div>`;
    if(Object.keys(tags).length) html += `<div class="sb-section"><div class="sb-label">Etiquetas</div><div class="chip-group">${Object.entries(tags).map(([k,v])=>`<button class="f-chip" data-fkey="tag" data-fval="${k}" onclick="setFilter('tag','${k}')">${k}<span class="chip-n">${v}</span></button>`).join('')}</div></div>`;
    document.getElementById('sb-content').innerHTML = html; syncChips();
  }

  function renderList(){
    const posts = S.posts;
    const listEl = document.getElementById('post-list');
    document.getElementById('list-count').innerText = `${posts.length} post${posts.length!==1?'s':''}`;
    renderFilterBadges();
    if(!posts.length){ listEl.innerHTML = '<div class="no-results">⌀ Sin coincidencias.</div>'; return; }
    const groups = new Map();
    posts.forEach(p=>{ let key = p.date ? p.date.slice(0,7) : 'sin-fecha'; if(!groups.has(key)) groups.set(key,[]); groups.get(key).push(p); });
    let html='';
    for(let [key, monthPosts] of groups.entries()){
      html += `<div class="month-label">— ${monthLabel(key)}</div>`;
      monthPosts.forEach(p=>{
        html += `<div class="post-card t-${p.type||'update'}" onclick="openPost('${p.slug}')"><div class="card-bar"></div><div class="card-inner"><div class="card-meta"><span class="card-date">${p.date||''}</span><span class="type-badge ${p.type||'update'}">${p.type||'update'}</span>${p.project ? `<span class="card-project">⌥ ${p.project}</span>` : ''}</div><div class="card-title">${getTitle(p)}</div>${getExcerpt(p) ? `<div class="card-excerpt">${getExcerpt(p)}</div>` : ''}${(p.tags||[]).length ? `<div class="card-tags">${p.tags.map(t=>`<span class="ptag">${t}</span>`).join('')}</div>` : ''}</div></div>`;
      });
    }
    listEl.innerHTML = html;
  }

  function setView(v){
    document.getElementById('empty-state').style.display = v === 'empty' ? 'flex' : 'none';
    document.getElementById('list-view').style.display = v === 'list' ? 'block' : 'none';
    document.getElementById('post-view').style.display = v === 'post' ? 'block' : 'none';
    document.getElementById('editor-view').style.display = v === 'editor' ? 'block' : 'none';
    S.view = v;
  }
  function showList(){ setView('list'); renderList(); }
  async function openPost(slug){
    setView('post');
    const headerEl = document.getElementById('post-header-el');
    const bodyEl = document.getElementById('post-body-el');
    headerEl.innerHTML = '<div class="loading-msg"><span class="spinner"></span> Cargando post...</div>';
    bodyEl.innerHTML = '';
    const meta = S.allPosts.find(p=>p.slug===slug);
    try{
      const raw = await loadPostFile(slug);
      const {fm, body} = parseFrontmatter(raw);
      const htmlBody = renderMd(body);
      const title = fm.title || getTitle(meta);
      const date = fm.date || meta?.date || '';
      const pType = fm.type || meta?.type || 'update';
      const project = fm.project || meta?.project || '';
      const tags = Array.isArray(fm.tags) ? fm.tags : (fm.tags ? fm.tags.split(',').map(t=>t.trim()) : (meta?.tags||[]));
      headerEl.className = `post-header t-${pType}`;
      headerEl.innerHTML = `<div class="post-meta"><span class="card-date">${date}</span><span class="type-badge ${pType}">${pType}</span>${project ? `<span class="card-project">⌥ ${project}</span>` : ''}</div><div class="post-h-title">${title}</div>${tags.length ? `<div class="post-tags-row">${tags.map(t=>`<span class="ptag">${t}</span>`).join('')}</div>` : ''}`;
      bodyEl.innerHTML = htmlBody;
    }catch(e){
      headerEl.innerHTML = ''; bodyEl.innerHTML = `<p style="color:var(--pink);">⚠ Error: ${e.message}</p>`;
    }
  }
  function openEditor(postData = null) {
    setView('editor');
    if (postData) {
      document.getElementById('ed-title').value = postData.title || '';
      document.getElementById('ed-project').value = postData.project || '';
      document.getElementById('ed-category').value = postData.category || '';
      document.getElementById('ed-tags').value = (postData.tags || []).join(', ');
      document.getElementById('ed-type').value = postData.type || 'devlog';
      document.getElementById('ed-body').value = postData.body || '';
      document.getElementById('editor-title').innerText = '✎ Editar Post';
      currentEditingSlug = postData.slug;
    } 
    else {
      document.getElementById('ed-title').value = '';
      document.getElementById('ed-project').value = '';
      document.getElementById('ed-category').value = '';
      document.getElementById('ed-tags').value = '';
      document.getElementById('ed-type').value = 'devlog';
      document.getElementById('ed-body').value = '';
      document.getElementById('editor-title').innerText = '✎ Nuevo Devlog';
      currentEditingSlug = null;
    }
  }
    
  function downloadMD(){
    const title = document.getElementById('ed-title').value;
    const project = document.getElementById('ed-project').value;
    const category = document.getElementById('ed-category').value;
    const tags = document.getElementById('ed-tags').value;
    const body = document.getElementById('ed-body').value;
    const date = new Date().toISOString().slice(0,10);
    const md = `---\ntitle: "${title}"\ndate: "${date}"\nproject: "${project}"\ncategory: "${category}"\ntags: [${tags.split(',').map(t=>`"${t.trim()}"`).join(', ')}]\n---\n\n${body}`;
    const blob = new Blob([md], {type:'text/markdown'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = (title.toLowerCase().replace(/\s+/g,'-') || 'post') + '.md';
    a.click();
  }
  
  function copyIndexEntry() {
    const title = document.getElementById('ed-title').value.trim();
    const project = document.getElementById('ed-project').value.trim();
    const category = document.getElementById('ed-category').value.trim();
    const tagsRaw = document.getElementById('ed-tags').value.trim();
    const type = document.getElementById('ed-type').value;
    const body = document.getElementById('ed-body').value.trim();

    const date = new Date().toISOString().slice(0,10);
    
    slug = `${date}`;

    // Generar excerpt (primeros 120 caracteres del body, sin saltos de línea)
    let excerpt = body.replace(/\n/g, ' ').slice(0, 120);
    if (excerpt.length === 120) excerpt += '…';

    const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(t => t) : [];

    const entry = {
      slug: slug,
      title: { es: title },
      date: date,
      type: type,
      lang: "es",
      project: project || "",
      category: category || "ulpomedia",
      tags: tags,
      excerpt: { es: excerpt }
    };

    const entryStr = JSON.stringify(entry, null, 2);

    // Mostrar en el textarea
    const preview = document.getElementById('json-preview');
    if (preview) preview.value = entryStr;

    // Copiar al portapapeles
    navigator.clipboard.writeText(entryStr).then(() => {
      alert('✅ Entrada JSON copiada al portapapeles. Pégala dentro del array "posts" de index.json');
    }).catch(() => {
      alert('No se pudo copiar automáticamente. Copia manualmente desde el campo de vista previa.');
    });
  }
  
  let searchTimer;
  document.getElementById('search-input').addEventListener('input', e=>{ clearTimeout(searchTimer); searchTimer = setTimeout(()=>{ S.filter.search = e.target.value.trim(); applyFilters(); if(S.view === 'list') renderList(); }, 220); });
  document.addEventListener('keydown', e=>{ if(e.key === 'Escape' && S.view === 'post') showList(); if((e.ctrlKey||e.metaKey) && e.key === 'o'){ e.preventDefault(); openFolder(); } if((e.ctrlKey||e.metaKey) && e.key === 'f' && S.view === 'list'){ e.preventDefault(); document.getElementById('search-input').focus(); } });
  if(!window.showDirectoryPicker){ let btn = document.getElementById('open-btn'); btn.textContent = '⚠ No compatible'; btn.disabled = true; }
</script>
</body>
</html>
